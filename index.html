<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartas QM - KIRO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@300;400;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4ede0;
  --bg2: #ebe1ce;
  --surface: #fdfaf3;
  --surface2: #f7f0e3;
  --gold: #b8860b;
  --gold2: #9c7209;
  --terra: #c17a54;
  --terra-soft: #d9a982;
  --ink: #4a3c2a;
  --ink2: #7a6a52;
  --ink3: #a89878;
  --heaven: #a0341e;
  --earth: #5a3d1e;
  --green: #4a7c3f;
  --green-bg: rgba(74,124,63,.10);
  --red: #b04a32;
  --red-bg: rgba(176,74,50,.08);
  --amber: #b8860b;
  --amber-bg: rgba(184,134,11,.08);
  --border: rgba(184,134,11,.22);
  --pal-bg: #fffdf8;
  --pal-bg2: #fdf8ee;
  --pal-border: #e0cfa8;
  --shadow: rgba(120,90,40,.10);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 25% 15%, rgba(217,169,130,.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 85%, rgba(184,134,11,.10) 0%, transparent 50%);
  min-height:100vh;
  font-family:'Inter',sans-serif;
  color:var(--ink);
  padding:14px;
}

/* HEADER */
.hdr { text-align:center; padding:22px 0 16px; }
.hdr-cn { font-family:'Noto Serif SC',serif; color:var(--gold); font-size:clamp(2rem,6vw,3.2rem); letter-spacing:.35em; font-weight:700; opacity:.85; }
.hdr-title { font-family:'Cormorant Garamond',serif; color:var(--terra); font-size:clamp(1rem,2.5vw,1.5rem); letter-spacing:.22em; margin-top:2px; font-weight:600; }
.hdr-sub { font-size:.72rem; color:var(--ink2); margin-top:4px; letter-spacing:.1em; }

/* CONTROL BAR */
.ctrl { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; max-width:920px; margin:0 auto 16px; display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; align-items:end; box-shadow:0 4px 20px var(--shadow); }
.fg label { display:block; font-size:.68rem; color:var(--gold2); letter-spacing:.06em; margin-bottom:5px; text-transform:uppercase; font-weight:600; }
.fg input, .fg select { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--ink); font-family:'Inter',sans-serif; font-size:.85rem; padding:8px 11px; outline:none; width:100%; transition:all .2s; }
.fg input:focus, .fg select:focus { border-color:var(--gold); background:#fff; box-shadow:0 0 0 3px rgba(184,134,11,.08); }
.btn-plot { background:linear-gradient(135deg,var(--terra),#a85f3c); border:none; border-radius:10px; color:#fff; font-family:'Cormorant Garamond',serif; font-size:.95rem; font-weight:700; letter-spacing:.06em; padding:10px 18px; cursor:pointer; transition:all .25s; align-self:end; width:100%; box-shadow:0 3px 12px rgba(193,122,84,.3); }
.btn-plot:hover { filter:brightness(1.08); transform:translateY(-1px); box-shadow:0 5px 18px rgba(193,122,84,.4); }

/* TABS */
.tabs { display:flex; justify-content:center; gap:3px; max-width:920px; margin:0 auto; }
.tab { background:var(--surface2); border:1px solid var(--border); border-bottom:none; border-radius:10px 10px 0 0; color:var(--ink3); font-size:.78rem; font-weight:600; padding:8px 18px; cursor:pointer; letter-spacing:.03em; transition:all .2s; }
.tab.on { background:var(--surface); color:var(--terra); border-color:var(--gold); box-shadow:0 -2px 8px var(--shadow); }
.tab:hover:not(.on) { color:var(--ink2); }

/* CHART WRAPPER */
.cs { max-width:920px; margin:0 auto; }
.cp { display:none; }
.cp.on { display:block; animation:fade .4s ease; }
@keyframes fade { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* 4 PILLARS */
.pillars { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px; display:grid; grid-template-columns:repeat(4,1fr); gap:8px; box-shadow:0 3px 14px var(--shadow); }
.pb { text-align:center; padding:7px 4px; border-right:1px solid var(--border); }
.pb:last-child { border-right:none; }
.pb-type { font-size:.6rem; color:var(--gold2); letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; font-weight:600; }
.pb-stem { font-family:'Noto Serif SC',serif; font-size:1.4rem; font-weight:700; color:var(--ink); line-height:1; }
.pb-en { font-size:.6rem; color:var(--ink2); margin-top:3px; }

/* INFO BAR */
.infobar { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:11px 15px; margin-bottom:10px; display:flex; flex-wrap:wrap; gap:9px 22px; align-items:center; }
.ib { display:flex; flex-direction:column; gap:1px; }
.ib-l { font-size:.58rem; color:var(--ink3); letter-spacing:.08em; text-transform:uppercase; }
.ib-v { font-size:.84rem; color:var(--ink); font-weight:600; }
.ib-v.yang { color:var(--terra); }
.ib-v.yin { color:#5a7a9c; }
.ib-v.gold { color:var(--gold2); font-size:.95rem; }
.ib-v.alert { color:var(--heaven); }

/* COMPASS */
.top-compass, .bot-compass { display:grid; grid-template-columns:1fr 1fr 1fr; background:var(--surface2); }
.top-compass { border:1px solid var(--border); border-bottom:none; border-radius:12px 12px 0 0; }
.bot-compass { border:1px solid var(--border); border-top:none; border-radius:0 0 12px 12px; }
.tc { text-align:center; padding:7px 2px; font-size:.64rem; color:var(--gold2); font-weight:700; letter-spacing:.03em; border-right:1px solid var(--border); }
.tc:last-child { border-right:none; }

/* 9 PALACE GRID */
.grid9 { display:grid; grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr; gap:3px; background:var(--bg2); border-left:1px solid var(--border); border-right:1px solid var(--border); padding:3px; }

.pal { background:var(--pal-bg); border:1px solid var(--pal-border); border-radius:5px; display:grid; grid-template-rows:auto auto 1fr auto; padding:6px; position:relative; min-height:115px; overflow:hidden; transition:all .2s; }
.pal:hover { background:var(--pal-bg2); z-index:2; box-shadow:0 3px 16px var(--shadow); transform:scale(1.01); }
.pal.center { background:linear-gradient(135deg,#f5ecd8,#f0e4cc); border-style:dashed; }

.pal-top { display:grid; grid-template-columns:auto 1fr; gap:4px; align-items:start; margin-bottom:3px; }
.pal-hstem { font-family:'Noto Serif SC',serif; font-size:clamp(1.05rem,2.3vw,1.55rem); font-weight:900; color:var(--heaven); line-height:1; min-width:24px; text-align:center; }
.pal-top-right { display:flex; flex-direction:column; gap:1px; align-items:flex-start; }
.pal-deity { font-size:clamp(.52rem,1vw,.7rem); color:#7a4d8e; font-weight:600; line-height:1.2; }
.pal-star { font-size:clamp(.48rem,.9vw,.64rem); color:#3a5a8e; line-height:1.2; }

.pal-div { border-top:1px solid rgba(184,134,11,.18); margin:2px 0; }

.pal-bot { display:grid; grid-template-columns:auto 1fr auto; gap:4px; align-items:end; }
.pal-estem { font-family:'Noto Serif SC',serif; font-size:clamp(1.05rem,2.3vw,1.55rem); font-weight:900; color:var(--earth); line-height:1; min-width:24px; text-align:center; }
.pal-door { font-size:clamp(.5rem,.95vw,.66rem); font-weight:700; line-height:1.2; align-self:end; }
.pal-door.aus { color:var(--green); }
.pal-door.inaus { color:var(--red); }
.pal-door.neut { color:var(--amber); }
.pal-num { font-size:clamp(1.5rem,3.2vw,2.3rem); font-weight:900; color:rgba(184,134,11,.2); line-height:1; align-self:end; }

.pal-dir { position:absolute; top:4px; right:5px; font-size:.52rem; color:rgba(120,90,40,.5); font-weight:700; }
.pal-trig { font-size:.54rem; color:rgba(120,90,40,.5); text-align:center; margin-bottom:1px; }

.pal-markers { position:absolute; top:3px; left:3px; display:flex; flex-direction:column; gap:2px; }
.mk { font-size:.48rem; padding:1px 4px; border-radius:3px; font-weight:700; line-height:1.3; }
.mk-ls { background:#fbf0cc; color:#8a6608; border:1px solid var(--gold); }
.mk-de { background:#ece4d4; color:#6a5638; border:1px solid var(--ink3); }
.mk-envoy { background:#f5d8cc; color:#9a3a1e; border:1px solid var(--terra); }
.mk-jia { background:#e8d5e8; color:#6a3a7a; border:1px solid #a87aa8; }

/* DATOS */
.datos { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:15px 18px; margin-top:12px; box-shadow:0 3px 14px var(--shadow); }
.datos h3 { font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--terra); letter-spacing:.1em; text-transform:uppercase; margin-bottom:11px; border-bottom:1px solid var(--border); padding-bottom:7px; font-weight:700; }
.datos-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px 18px; }
.dr { display:flex; align-items:baseline; gap:6px; }
.dl { font-size:.64rem; color:var(--ink2); white-space:nowrap; }
.dv { font-size:.8rem; color:var(--ink); font-weight:600; }

/* ENERGY */
.energy { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:13px 18px; margin-top:12px; box-shadow:0 3px 14px var(--shadow); }
.energy h3 { font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--terra); letter-spacing:.1em; text-transform:uppercase; margin-bottom:9px; font-weight:700; }
.energy-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
.ec { display:flex; align-items:center; gap:5px; }
.ec-l { font-size:.66rem; color:var(--ink2); }
.ec-v { font-size:.95rem; }

/* ZULEMA */
.zulema { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:15px 18px; margin-top:12px; box-shadow:0 3px 14px var(--shadow); }
.zulema h3 { font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--terra); letter-spacing:.1em; text-transform:uppercase; margin-bottom:11px; border-bottom:1px solid var(--border); padding-bottom:7px; font-weight:700; }
.zt { margin-bottom:8px; padding:11px 13px; background:var(--surface2); border-radius:9px; border-left:3px solid var(--terra-soft); }
.zt-header { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
.zt-stem { font-family:'Noto Serif SC',serif; font-size:1.4rem; font-weight:900; color:var(--ink); }
.zt-role { font-size:.72rem; color:var(--gold2); font-weight:600; }
.zt-loc { font-size:.72rem; color:var(--ink2); margin-left:auto; }

/* LEGEND */
.legend { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:13px 18px; margin-top:12px; display:flex; flex-wrap:wrap; gap:14px; box-shadow:0 3px 14px var(--shadow); }
.lg-g { display:flex; flex-direction:column; gap:5px; }
.lg-t { font-size:.6rem; color:var(--gold2); letter-spacing:.08em; text-transform:uppercase; font-weight:600; }
.lg-items { display:flex; flex-wrap:wrap; gap:6px; }
.lg-i { font-size:.64rem; color:var(--ink2); display:flex; align-items:center; gap:4px; }
.lg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* COPY BUTTON */
.copy-bar { max-width:920px; margin:14px auto 0; text-align:center; }
.btn-copy { background:var(--surface); border:1px solid var(--gold); border-radius:10px; color:var(--gold2); font-family:'Cormorant Garamond',serif; font-size:.9rem; font-weight:700; letter-spacing:.05em; padding:10px 24px; cursor:pointer; transition:all .2s; }
.btn-copy:hover { background:var(--gold); color:#fff; }

@media(max-width:520px){
  .pal{min-height:90px;padding:4px;}
  .pal-hstem,.pal-estem{font-size:clamp(.9rem,3.8vw,1.25rem);}
  .pal-num{font-size:clamp(1.2rem,4.5vw,1.7rem);}
  .ctrl{grid-template-columns:1fr 1fr;}
  .datos-grid{grid-template-columns:1fr;}
}
</style>
</head>

<div id="kiro-login" style="position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#f4ede0,#ebe1ce);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;">
  <div style="background:#fdfaf3;border:1px solid rgba(184,134,11,.35);border-radius:16px;padding:42px 36px;width:90%;max-width:360px;box-shadow:0 20px 60px rgba(120,90,40,.18);text-align:center;">
    <div style="font-size:2.2rem;color:#b8860b;font-weight:800;letter-spacing:.1em;margin-bottom:4px;">KIRO</div>
    <div style="font-size:.95rem;color:#7a6a52;margin-bottom:30px;letter-spacing:.05em;">Generador de Cartas QMDJ</div>
    <input id="kiro-user" type="text" placeholder="Usuario" autocomplete="off" style="width:100%;box-sizing:border-box;padding:12px 14px;margin-bottom:12px;background:#f7f0e3;border:1px solid rgba(184,134,11,.3);border-radius:10px;color:#4a3c2a;font-size:1rem;font-family:inherit;outline:none;">
    <input id="kiro-pass" type="password" placeholder="Clave" style="width:100%;box-sizing:border-box;padding:12px 14px;margin-bottom:18px;background:#f7f0e3;border:1px solid rgba(184,134,11,.3);border-radius:10px;color:#4a3c2a;font-size:1rem;font-family:inherit;outline:none;">
    <button id="kiro-login-btn" style="width:100%;padding:13px;background:#b8860b;border:none;border-radius:10px;color:#fdfaf3;font-size:1rem;font-weight:800;letter-spacing:.06em;cursor:pointer;font-family:inherit;transition:background .2s;" onmouseover="this.style.background='#9c7209'" onmouseout="this.style.background='#b8860b'">Ingresar</button>
    <div id="kiro-error" style="color:#b04a32;font-size:.85rem;margin-top:14px;min-height:18px;"></div>
  </div>
</div>
<script>
(function(){
  var U="zulemagy", P="zgy2026$$";
  function tryLogin(){
    var u=document.getElementById('kiro-user').value;
    var p=document.getElementById('kiro-pass').value;
    if(u===U && p===P){
      document.getElementById('kiro-login').style.display='none';
      try{sessionStorage.setItem('kiro-auth','1');}catch(e){}
    } else {
      document.getElementById('kiro-error').textContent='Usuario o clave incorrectos';
    }
  }
  function init(){
    try{ if(sessionStorage.getItem('kiro-auth')==='1'){ document.getElementById('kiro-login').style.display='none'; return; } }catch(e){}
    document.getElementById('kiro-login-btn').addEventListener('click',tryLogin);
    document.getElementById('kiro-pass').addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin();});
    document.getElementById('kiro-user').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('kiro-pass').focus();});
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>

{let s=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'],b=BR;for(let i=0;i<60;i++)ALL60.push(s[i%10]+b[i%12]);}

// Flying numbers: center = structure number, others rotate from Luo Shu
// Formula: flyNum[p] = ((LS[p] - 1 + (structNum - 5 + 9)) % 9) + 1
// Verified: Yang1✓ Yang6✓ Yang8✓ Yang9✓
const LS_NUM={n:1,sw:2,e:3,se:4,c:5,nw:6,w:7,ne:8,s:9};
function getFlyingNum(p, structNum, isYin){
  if(p==='c') return structNum;
  const shift=((structNum-5)%9+9)%9;
  const base=((LS_NUM[p]-1+shift)%9)+1;


  return base;
}
const FLYING_NUM={}; // kept for backward compat but now computed dynamically

function getHourBranch(h){const idx=Math.floor(((h+1)%24)/2);return{br:BR[idx],idx};}

function compute(sk,dk,h,chartType,overridePillar){
  // chartType: 'h'=hour, 'd'=day, 'm'=month, 'y'=year
  // overridePillar: optional pillar string for month/year charts
  if(chartType===true)chartType='h';
  if(chartType===false||!chartType)chartType='d';
  const isYin=sk.startsWith('yin');
  const sNum=parseInt(sk.replace(/[a-z]/gi,''));
  const EP=Object.assign({},EP_ALL[sk]);
  const di=DAY_MAP[dk]||DAY_MAP['guichou'];
  const dStem=di[0],dBranch=di[1];
  const {br:hBr,idx:hIdx}=getHourBranch(h);
  const hStem=(HR_CYCLE[dStem]||HR_CYCLE['甲'])[hIdx];
  const hPillar=hStem+hBr;
  const dPillar=dStem+dBranch;
  const mp=overridePillar||(typeof MONTH_PILLAR!=='undefined'?MONTH_PILLAR:'甲午');
  const yp=overridePillar||(typeof YEAR_PILLAR!=='undefined'?YEAR_PILLAR:'丙午');

  // Active stem by chart type
  let activeStem, activePillar;
  if(chartType==='h'){activeStem=hStem;activePillar=hPillar;}
  else if(chartType==='m'){activeStem=mp[0];activePillar=mp;}
  else if(chartType==='y'){activeStem=yp[0];activePillar=yp;}
  else{activeStem=dStem;activePillar=dPillar;}
  const leadStem=LS_MAP[activePillar]||'戊';

  // Chief flies to palace where EARTH stem = active stem
  // NOTE: validated vs 4 real charts — the active stem is ALWAYS found in an
  // outer palace of the Earth Plate (the center stem 乙/Yi never acts as active
  // stem in practice because hour stems map to the Liu Yi San Qi outer positions).
  // No special center rule needed: just locate the active stem.
  let chiefPal=null;
  for(const[p,s]of Object.entries(EP))if(s===activeStem&&p!=='c'){chiefPal=p;break;}
  if(!chiefPal){
    // 甲 hidden: Chief goes to the Lead Stem palace (validated vs month chart Yin7)
    if(activeStem==='甲'){
      for(const[p,s]of Object.entries(EP))if(s===leadStem&&p!=='c'){chiefPal=p;break;}
    }
    // Active stem at center: borrows SW (validated 9 jun day 甲寅 with 癸 center)
    if(!chiefPal) chiefPal='sw';
  }
  let leadEarthPal=null, leadInCenter=false;
  for(const[p,s]of Object.entries(EP))if(s===leadStem&&p!=='c'){leadEarthPal=p;break;}
  if(!leadEarthPal){
    // Lead stem in center: borrows SW for plate position, but envoy flies from center (LS5)
    leadEarthPal='sw';
    leadInCenter=true;
  }

  const offset=(CW8.indexOf(chiefPal)-CW8.indexOf(leadEarthPal)+8)%8;

  // Heaven Plate
  const HP={};for(let i=0;i<8;i++)HP[CW8[(i+offset)%8]]=EP[CW8[i]];HP['c']=EP['c'];
  // Fu Yin check (must be before doors)
  let fuYin=true;for(const p of CW8)if(EP[p]!==HP[p]){fuYin=false;break;}
  // Stars
  const SP={};for(let i=0;i<8;i++)SP[CW8[(i+offset)%8]]=STAR_NATAL[CW8[i]];SP['c']=STAR_NATAL['c'];
  // ENVOY & DOORS (decoded 12jun vs real charts):
  // Envoy flies from lead palace via Luo Shu +1 per unit (day/hour) since stream start
  // Position in stream: how many units since 甲 (Jia) of current 旬
  const STREAM_POS={'甲':1,'乙':2,'丙':3,'丁':4,'戊':5,'己':6,'庚':7,'辛':8,'壬':9,'癸':10};
  const posInStream=STREAM_POS[activeStem]||1;
  const LS_OF_PAL={n:1,sw:2,e:3,se:4,c:5,nw:6,w:7,ne:8,s:9};
  const PAL_OF_LS={1:'n',2:'sw',3:'e',4:'se',5:'c',6:'nw',7:'w',8:'ne',9:'s'};
  const envoyBaseLS=leadInCenter?5:LS_OF_PAL[leadEarthPal];
  let envoyLS=envoyBaseLS+(isYin?-(posInStream-1):(posInStream-1));
  envoyLS=((envoyLS-1)%9+9)%9+1;
  let envoyPal=PAL_OF_LS[envoyLS];
  if(envoyPal==='c')envoyPal='sw'; // center borrows SW
  // Doors rotate so natal door of lead palace lands on envoy palace
  const CW8_DOOR=['nw','n','ne','e','se','s','sw','w'];
  const DOOR_SEQ_LIST=[DOOR_NATAL.nw,DOOR_NATAL.n,DOOR_NATAL.ne,DOOR_NATAL.e,DOOR_NATAL.se,DOOR_NATAL.s,DOOR_NATAL.sw,DOOR_NATAL.w];
  const leadIdx=CW8.indexOf(leadEarthPal);
  const envoyIdx=CW8.indexOf(envoyPal);
  const doorOffset=((leadIdx-envoyIdx)%8+8)%8;
  const DP={};
  for(let i=0;i<8;i++) DP[CW8_DOOR[i]]=DOOR_SEQ_LIST[(i+doorOffset)%8];
  // Deities
  const DEP={};const DSEQ=isYin?DEITY_N:DEITY_Y;const ci=CW8.indexOf(chiefPal);
  for(let i=0;i<8;i++){const idx=(ci+i)%8;DEP[CW8[idx]]=DSEQ[i];} // both Yang & Yin go CW (verified vs Yin7 month chart)

  const de=DE_MAP[dPillar]||['—','—'];
  const dePals=de.map(b=>BR_PAL[b]||'—');
  const envoy=DP[envoyPal]?DP[envoyPal].en:'—';

  return {isYin,sNum,EP,HP,DP,SP,DEP,leadStem,chiefPal,leadEarthPal,offset,
          dStem,dBranch,dPillar,dRoman:di[2],dAnimal:di[3],hStem,hBr,hPillar,
          de,dePals,envoy,envoyPal,fuYin,sKey:sk};
}

function energyLvl(pid,d){
  let a=0,n=0;
  const door=d.DP[pid];if(door){if(door.q==='aus')a++;else if(door.q==='inaus')n++;}
  const star=d.SP[pid];if(star){if(star.q==='good')a++;else if(star.q==='bad')n++;}
  const dy=d.DEP[pid];if(dy){if(DEITY_AUS.includes(dy.en))a++;else if(DEITY_INAUS.includes(dy.en))n++;}
  const hs=d.HP[pid];if(hs){if(STEM_Q[hs]==='aus')a++;else n++;}
  if(n>a)return'❌';if(a>n)return'✅';return'⚠️';
}

  html+=`<div class="top-compass"><div class="tc">SE · Xun 巽</div><div class="tc">S · Li 離</div><div class="tc">SW · Kun 坤</div></div>`;
  html+=`<div class="grid9">`;
  for(const p of PALACES){
    const es=EP[p.id]||'—',hs=(p.id!=='c')?(HP[p.id]||'—'):'—';
    const door=DP[p.id],star=SP[p.id],deity=DEP[p.id];
    const isCenter=p.id==='c';
    let mk='';
    if(p.id===chiefPal)mk+='<span class="mk mk-ls">Lead Star</span>';

    html+=`<div class="pal ${isCenter?'center':''}">
      <div class="pal-markers">${mk}</div>

function housePillar(facing, period){
  const branch = BR_CYCLE[((8-period)%12+12)%12];
  const base = FS_BASE_P8[facing] ?? 0;
  const stem = STEMS10[((base+(period-8))%10+10)%10];
  return {pillar:stem+branch, stem, branch};
}

function isYangPeriod(date) {
  // Yang: after winter solstice, before summer solstice
  const yr = date.getFullYear();
  // Approximate solstice dates
  const winterPrev = new Date(yr-1, 11, 22);
  const summerThis = new Date(yr, 5, 21);
  const winterThis = new Date(yr, 11, 22);
  const summerNext = new Date(yr+1, 5, 21);
  return (date >= winterPrev && date < summerThis) ||
         (date >= winterThis && date < summerNext);
}

  {name:'立秋',start:[2026,8,7],  upper:2,middle:8,lower:5,isYin:true},

];

// Lead Days (符頭) — 甲/己 days and their Yuan type
// Branch → Yuan: 子午卯酉=Upper, 寅申巳亥=Middle, 辰戌丑未=Lower
const LEAD_DAY_YUAN = {
  '甲子':'upper','甲午':'upper','己卯':'upper','己酉':'upper',
  '甲寅':'middle','甲申':'middle','己巳':'middle','己亥':'middle',
  '甲辰':'lower','甲戌':'lower','己丑':'lower','己未':'lower',
};

// 60-day cycle to find lead day for any date
const BRANCHES12 = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
// Anchor: Jun 9 2026 = 甲寅 (day 51 in 60-cycle, 0-indexed=50)
const GANZHI_ANCHOR = new Date(2026,5,9); // 甲寅
const GANZHI_ANCHOR_IDX = 50; // 甲寅 in 60-cycle (0-based)

function dayPillarIdx(date) {
  const diff = Math.round((date - GANZHI_ANCHOR) / 86400000);
  return ((GANZHI_ANCHOR_IDX + diff) % 60 + 60) % 60;
}

function dayPillar(date) {
  const idx = dayPillarIdx(date);
  return STEMS10[idx%10] + BRANCHES12[idx%12];
}

function getLeadDay(date) {
  // Find most recent 甲 or 己 day on or before date
  for (let d = 0; d <= 9; d++) {
    const check = new Date(date - d*86400000);
    const p = dayPillar(check);
    if (p[0]==='甲' || p[0]==='己') return { pillar: p, date: new Date(check) };
  }
  return null;
}

function getSolarTerm(date) {
  let term = null;
  for (let i = SOLAR_TERMS.length-1; i >= 0; i--) {
    const [y,m,day] = SOLAR_TERMS[i].start;
    if (date >= new Date(y,m-1,day)) { term = SOLAR_TERMS[i]; break; }
  }
  return term;
}

function getNextSolarTerm(date) {
  for (let i = 0; i < SOLAR_TERMS.length; i++) {
    const [y,m,day] = SOLAR_TERMS[i].start;
    if (new Date(y,m-1,day) > date) return { term: SOLAR_TERMS[i], start: new Date(y,m-1,day) };
  }
  return null;
}

// DAY chart structure = daily star from calendar
// Yang +1/day | Yin -1/day
// Ascending Qi rule: Yin period starts at Lead Day of Xia Zhi (Jun 19 甲子), not Jun 21.
// Anchors verified vs Joey Yap: Yang=Jun9 甲寅 star9 | Yin=Jun19 甲子 star9
const DAY_YANG_ANCHOR = new Date(2026,5,9);
const DAY_YANG_STAR = 9;
const DAY_YIN_ANCHOR = new Date(2026,5,19);
const DAY_YIN_STAR = 9;
const DAY_YIN_START = new Date(2026,5,19);
const DAY_YIN_END   = new Date(2026,11,21);

function dayStarStructure(date) {
  const isYin = (date >= DAY_YIN_START && date < DAY_YIN_END);
  let s;
  if (isYin) {
    const diff = Math.round((date - DAY_YIN_ANCHOR) / 86400000);
    s = ((DAY_YIN_STAR - 1 - diff) % 9 + 9*100) % 9 + 1;
  } else {
    const diff = Math.round((date - DAY_YANG_ANCHOR) / 86400000);
    s = ((DAY_YANG_STAR - 1 + diff) % 9 + 9) % 9 + 1;
  }
  return { struct: s, isYin, key: (isYin?'yin':'yang')+s };
}

// HOUR chart structure = Yuan (Zhi Run) method
// Ascending Qi 超神: if Lead Day falls before the next term start by <5 days,
// it already belongs to that next term's Upper Yuan → use next term.
function autoStructure(date) {
  const leadDayResult = getLeadDay(date);
  const leadDay = leadDayResult ? leadDayResult.pillar : null;
  const leadDate = leadDayResult ? leadDayResult.date : null;

  const term = getSolarTerm(date);
  if (!term) {
    const yang = isYangPeriod(date);
    const diff = Math.round((date - ANCHOR_DATE) / 86400000);
    let s = ((ANCHOR_STRUCT + diff - 1) % 9 + 9) % 9 + 1;
    return { struct: s, isYin: !yang, key: (yang?'yang':'yin')+s, term:'?' };
  }

  // Check Ascending Qi 超神: does the Lead Day fall before the NEXT term, within <5 days?
  const nextTermInfo = getNextSolarTerm(date);
  let activeTerm = term;
  if (nextTermInfo && leadDate) {
    const daysToNextTerm = Math.round((nextTermInfo.start - leadDate) / 86400000);
    // Lead Day is before the next term AND within 4 days → Ascending Qi → belongs to next term
    if (daysToNextTerm >= 0 && daysToNextTerm < 5) {
      activeTerm = nextTermInfo.term;
    }
  }

  const yuan = leadDay ? (LEAD_DAY_YUAN[leadDay] || 'upper') : 'upper';
  const s = activeTerm[yuan];
  return { struct: s, isYin: activeTerm.isYin, key: (activeTerm.isYin?'yin':'yang')+s,
           term: activeTerm.name, yuan, leadDay: leadDay||'?' };
}

// Auto-fill structure when date changes
function autoFillStructure() {
  const dateVal = document.getElementById('iDate').value;
  if (!dateVal) return;
  const [yr, mo, dy] = dateVal.split('-').map(Number);
  const date = new Date(yr, mo-1, dy);
  const result = dayStarStructure(date);
  const hourResult = autoStructure(date);
  document.getElementById('iStruct').value = result.key;
  const ind = document.getElementById('struct-auto');
  if (ind) {
    const yy = result.isYin ? 'Yin' : 'Yang';
    const hy = hourResult.isYin ? 'Yin' : 'Yang';
    ind.textContent = `⚡ Día: ${yy} ${result.struct} · Hora: ${hy} ${hourResult.struct} (${hourResult.term} ${hourResult.yuan||''})`;
  }
  // Auto-select day pillar from date
  const pillar = dayPillar(date);
  const STEMS_EN_MAP={'甲':'jia','乙':'yi','丙':'bing','丁':'ding','戊':'wu','己':'ji','庚':'geng','辛':'xin','壬':'ren','癸':'gui'};
  const BR_EN_MAP={'子':'zi','丑':'chou','寅':'yin','卯':'mao','辰':'chen','巳':'si','午':'wu','未':'wei','申':'shen','酉':'you','戌':'xu','亥':'hai'};
  const key = STEMS_EN_MAP[pillar[0]] + BR_EN_MAP[pillar[1]];
  const daySelect = document.getElementById('iDay');
  if (daySelect && DAY_MAP[key]) daySelect.value = key;
}

// ═══ YEAR STRUCTURE TABLE ══════════════════════
// Source: QMDJ Month Charts Joey Yap — year pillar → month Yin structure
const YEAR_STRUCT_MAP={'丙午':'yin7','丁未':'yin4','戊申':'yin1','己酉':'yin7','庚戌':'yin4'};
const YEAR_PILLAR_MAP={2025:'乙巳',2026:'丙午',2027:'丁未',2028:'戊申',2029:'己酉',2030:'庚戌'};

// ═══ SOLAR MONTH PILLARS 2026 ════════════════
// Source: Ten Thousand Year Calendar, Five Tigers table
const MONTH_PILLARS_2026=[
  [[1,5],'己丑'],[[2,4],'庚寅'],[[3,6],'辛卯'],[[4,4],'壬辰'],
  [[5,5],'癸巳'],[[6,5],'甲午'],[[7,7],'乙未'],[[8,7],'丙申'],
  [[9,7],'丁酉'],[[10,8],'戊戌'],[[11,7],'己亥'],[[12,7],'庚子'],
];

function getMonthPillar(date){
  const mmdd=[date.getMonth()+1,date.getDate()];
  const table=MONTH_PILLARS_2026;
  let pillar=table[0][1];
  for(let i=table.length-1;i>=0;i--){
    const[m,d]=table[i][0];
    if(mmdd[0]>m||(mmdd[0]===m&&mmdd[1]>=d)){pillar=table[i][1];break;}
  }
  return pillar;
}

function getYearPillar(date){return YEAR_PILLAR_MAP[date.getFullYear()]||'丙午';}

const YEAR_PILLAR='丙午';
const YEAR_STRUCT='yin1';

function plotAll(){
  const ds=document.getElementById('iDate').value;
  const ts=document.getElementById('iTime').value;
  const dk=document.getElementById('iDay').value;
  const h=parseInt(ts.split(':')[0]);
  const[yr,mo,dyy]=ds.split('-').map(Number);
  const dateObj=new Date(yr,mo-1,dyy);
  const hourStruct=autoStructure(dateObj).key;
  const dayStruct=dayStarStructure(dateObj).key;
  const monthPillar=getMonthPillar(dateObj);
  const yearPillar=getYearPillar(dateObj);
  const monthStruct=YEAR_STRUCT_MAP[yearPillar]||'yin7';
  document.getElementById('hc').innerHTML=renderChart(ds,h,compute(hourStruct,dk,h,'h'),'h');
  document.getElementById('dc').innerHTML=renderChart(ds,h,compute(dayStruct,dk,h,'d'),'d');
  document.getElementById('mc').innerHTML=renderChart(ds,h,compute(monthStruct,dk,h,'m',monthPillar),'m');
  document.getElementById('yc').innerHTML=renderChart(ds,h,compute(YEAR_STRUCT,dk,h,'y',yearPillar),'y');
}

function sw(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.cp').forEach(p=>p.classList.remove('on'));
  document.querySelector(`[onclick="sw('${t}')"]`).classList.add('on');
  document.getElementById('p'+t).classList.add('on');
  if(t==='fs' && !document.getElementById('fsc').innerHTML) plotFS();
}

function copyText(){
  // Generate KIRO standard text format from current chart data
  const ds=document.getElementById('iDate').value;
  const ts=document.getElementById('iTime').value;
  const sk=document.getElementById('iStruct').value;
  const dk=document.getElementById('iDay').value;
  const h=parseInt(ts.split(':')[0]);
  const activeTab=document.querySelector('.cp.on').id; // ph/pd/pm/py/pfs
  const typeMap={ph:'h',pd:'d',pm:'m',py:'y'};
  const cType=typeMap[activeTab]||'d';
  const isHour=cType==='h';
  const [cyr,cmo,cdy]=ds.split('-').map(Number);
  const cDate=new Date(cyr,cmo-1,cdy);
  const skUse=cType==='m'?MONTH_STRUCT:cType==='y'?YEAR_STRUCT:cType==='h'?autoStructure(cDate).key:dayStarStructure(cDate).key;
  const d=compute(skUse,dk,h,cType);
  const tipoMap={h:'DE LA HORA',d:'DEL DÍA',m:'DEL MES',y:'DEL AÑO'};

  const SE_R={'戊':'Wu','己':'Ji','庚':'Geng','辛':'Xin','壬':'Ren','癸':'Gui','丁':'Ding','丙':'Bing','乙':'Yi','甲':'Jia'};
  const BR_R={'子':'Zi Rat','丑':'Chou Ox','寅':'Yin Tiger','卯':'Mao Rabbit','辰':'Chen Dragon','巳':'Si Snake','午':'Wu Horse','未':'Wei Goat','申':'Shen Monkey','酉':'You Rooster','戌':'Xu Dog','亥':'Hai Pig'};
  const [yr,mo,dy]=ds.split('-');
  const months=['','enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const fecha=parseInt(dy)+' '+months[parseInt(mo)]+' '+yr;
  const tipo=tipoMap[cType];
  const pol=d.isYin?'Yin':'Yang';

  let txt='CARTA '+tipo+': '+fecha+'\n';
  if(isHour) txt+='Hora: '+ts+' - '+(d.hBr?BR_R[d.hBr].split(' ')[0]:'')+'\nTallo de la hora: '+SE_R[d.hStem]+' | Tallo del dia: '+SE_R[d.dStem]+'\n';
  else txt+='Tallo del dia: '+SE_R[d.dStem]+'\n';
  txt+='Lead Stem: '+SE_R[d.leadStem]+' | Envoy: '+d.envoy+' Door '+d.envoyPal.toUpperCase()+'\n';
  txt+='DE: '+(BR_R[d.de[0]]||'-')+' / '+(BR_R[d.de[1]]||'-')+' | JIA: '+d.chiefPal.toUpperCase()+'\n';
  txt+='Estructura: '+pol+' '+d.sNum+(d.fuYin?' - Fu Yin':'')+'\n\n';

  txt+='Dir | # | Cielo/Tierra | Estrella | Puerta | Deidad | Formaciones\n';
  const dirs=['se','s','sw','e','w','ne','n','nw'];
  for(const p of dirs){
    const num=getFlyingNum(p,d.sNum,d.isYin);
    const ct=SE_R[d.HP[p]]+'/'+SE_R[d.EP[p]];
    const star=d.SP[p]?d.SP[p].en:'-';
    const door=d.DP[p]?d.DP[p].en:'-';
    const deity=d.DEP[p]?d.DEP[p].en:'-';
    let form=[];
    if(p===d.chiefPal)form.push('Lead/JIA');
    if(p===d.leadEarthPal&&p!==d.chiefPal)form.push('Lead Stem');
    if(p===d.envoyPal)form.push('Envoy');
    if(d.dePals.includes(p))form.push('DE');
    if(d.fuYin)form.push('Fu Yin');
    txt+=p.toUpperCase().padEnd(3)+' | '+num+' | '+ct.padEnd(12)+' | '+star.padEnd(10)+' | '+door.padEnd(8)+' | '+deity.padEnd(7)+' | '+(form.join('/')||'*')+'\n';
  }
  const cnum=d.sNum;
  txt+='C   | '+cnum+' | '+SE_R[d.HP.c]+'/'+SE_R[d.EP.c]+'       | Bird       | -        | -       | *\n\n';

  txt+='4 TALLOS EN LA CARTA:\n';
  const stems=[['壬','Ren','Self'],['辛','Xin','EI'],['甲','Jia','Rival'],['戊','Wu','Liderazgo']];
  for(const[st,rom,role]of stems){
    let loc='-',num='-';
    if(st==='甲'){loc=d.chiefPal.toUpperCase();num=getFlyingNum(d.chiefPal,d.sNum,d.isYin);}
    else{
      let found=false;
      for(const p of dirs)if(d.HP[p]===st){loc=p.toUpperCase();num=getFlyingNum(p,d.sNum,d.isYin);found=true;break;}
      if(!found&&d.EP.c===st){loc='Centro';num=d.sNum;}
    }
    const star=loc!=='-'&&loc!=='Centro'?(d.SP[loc.toLowerCase()]?d.SP[loc.toLowerCase()].en:''):'Bird';
    const door=loc!=='-'&&loc!=='Centro'?(d.DP[loc.toLowerCase()]?d.DP[loc.toLowerCase()].en:''):'';
    const deity=loc!=='-'&&loc!=='Centro'?(d.DEP[loc.toLowerCase()]?d.DEP[loc.toLowerCase()].en:''):'';
    const comps=[star,door,deity].filter(x=>x).join('/');
    txt+=st+' '+rom+' ('+role+'): Palacio '+num+' '+loc+' - '+comps+'\n';
  }

  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.querySelector('.btn-copy');
    const o=b.textContent;b.textContent='✓ Copiado!';setTimeout(()=>b.textContent=o,1500);
  }).catch(()=>{
    // Fallback for older browsers
    const ta=document.createElement('textarea');
    ta.value=txt;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    const b=document.querySelector('.btn-copy');
    const o=b.textContent;b.textContent='✓ Copiado!';setTimeout(()=>b.textContent=o,1500);
  });
}

window.onload=()=>{
  // Set date to today
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById('iDate').value=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  document.getElementById('iTime').value=pad(now.getHours())+':'+pad(now.getMinutes());
  autoFillStructure();
  plotAll();
  document.getElementById('iDate').addEventListener('change', ()=>{
    autoFillStructure();
    plotAll();
  });
};
